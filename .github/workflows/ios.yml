name: Build iOS TestFlight

on:
  push:
    tags:
      - 'v*'
      - '!v*-android'
      - '!v*-windows'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Create .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          test -n "$ENV_FILE" || { echo "ERROR: ENV_FILE secret is missing"; exit 1; }
          printf '%s' "$ENV_FILE" > .env

      - name: Run Tests with Coverage
        run: flutter test --dart-define-from-file=.env --coverage

      - name: Enforce Coverage Threshold
        run: dart run tool/check_coverage.dart coverage/lcov.info 5

      - name: Run Fastlane Beta
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
        run: |
          cd ios
          fastlane beta

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jawhar-ios-${{ github.ref_name }}
          path: build/ios/ipa/*.ipa
          retention-days: 90

name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: functions/package.json
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Create .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          test -n "$ENV_FILE" || { echo "ERROR: ENV_FILE secret is missing"; exit 1; }
          printf '%s' "$ENV_FILE" > .env

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib test

      - name: Test with Coverage
        run: flutter test --dart-define-from-file=.env --coverage

      - name: Enforce Coverage Threshold
        run: dart run tool/check_coverage.dart coverage/lcov.info 5

      - name: Install Functions Dependencies
        working-directory: functions
        run: npm ci

      - name: Build Functions
        working-directory: functions
        run: npm run build

      - name: Lint Functions
        working-directory: functions
        run: npm run lint

      - name: Test Functions Security
        working-directory: functions
        run: npm run test:unit

      - name: Test Firestore Rules
        working-directory: functions
        run: npm run test:rules

  # Pure-Dart workspace package gates (roadmap §10): hifz_core carries the
  # corruption-class domain logic, so it gets its own 80% line-coverage
  # floor while the app-wide floor stays 5%. No .env / dart-defines needed.
  hifz-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # The pub workspace root is the Flutter app, so resolving any member
      # requires the Flutter SDK — hifz_core itself stays pure Dart.
      - name: Install Workspace Dependencies
        run: flutter pub get

      - name: Enforce Flutter-free hifz_core
        run: |
          if grep -rEn "^[[:space:]]*(import|export)[[:space:]]+'(package:(flutter|sqflite|firebase|cloud_|quran)|dart:ui)" packages/hifz_core/lib; then
            echo "hifz_core must stay free of Flutter/sqflite/Firebase/quran imports (roadmap §6)"
            exit 1
          fi
          echo "hifz_core is Flutter-free"

      - name: Analyze hifz_core
        working-directory: packages/hifz_core
        run: dart analyze

      - name: Test hifz_core with Coverage
        working-directory: packages/hifz_core
        run: dart run coverage:test_with_coverage

      - name: Enforce hifz_core Coverage Threshold (80%)
        run: >-
          dart run tool/check_coverage.dart
          packages/hifz_core/coverage/lcov.info 80 packages/hifz_core/lib

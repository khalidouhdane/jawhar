name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
      - '!v*-android'
      - '!v*-ios'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Create .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          test -n "$ENV_FILE" || { echo "ERROR: ENV_FILE secret is missing"; exit 1; }
          printf '%s' "$ENV_FILE" > .env
        shell: bash

      - name: Run Tests with Coverage
        run: flutter test --dart-define-from-file=.env --coverage

      - name: Enforce Coverage Threshold
        run: dart run tool/check_coverage.dart coverage/lcov.info 5

      - name: Enable Windows Build
        run: flutter config --enable-windows-desktop

      - name: Build Windows App
        env:
          # GitHub runners now ship CMake 4.x, which hard-errors on the
          # ancient cmake_minimum_required declared inside the vendored
          # Firebase C++ SDK. This is CMake's documented escape hatch
          # restoring pre-4.0 policy compatibility for such dependencies.
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: flutter build windows --release --dart-define-from-file=.env

      - name: Package Windows Build
        shell: powershell
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\windows\jawhar-windows.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/windows/jawhar-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: jawhar_api
description: >-
  jawhar-api — Dart shelf service on Cloud Run. Owns /v1 endpoints; Firestore
  via FirestoreGateway (firebase_admin_sdk). See docs/CLOUD_FIRST_MIGRATION_ROADMAP.md.
publish_to: none
version: 0.1.0

# NOTE (follow-up for the stream that owns the root pubspec.yaml):
# add `server/api` to the root pub workspace and set `resolution: workspace`
# here. This package deliberately resolves standalone in Wave 1 because the
# root pubspec.yaml is owned by another stream.

environment:
  sdk: ^3.9.0

dependencies:
  firebase_admin_sdk: ^0.5.3
  # Direct dep because FirestoreGateway uses its Settings/Transaction types
  # (firebase_admin_sdk exposes them from this package).
  google_cloud_firestore: ^0.5.2
  http: ^1.2.0
  sentry: ^9.0.0
  shelf: ^1.4.0
  shelf_router: ^1.1.0

dev_dependencies:
  googleapis_auth: ^2.0.0 # spike only: inject a gcloud access token
  lints: ^6.0.0
  test: ^1.25.0

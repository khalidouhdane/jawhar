name: hifz_core
description: >-
  Pure Dart domain core shared by the Jawhar Flutter app and the jawhar-api
  server: SM-2 SRS engine, deterministic plan generation, AI plan validation,
  shared domain models, and vendored Quran metadata. MUST stay free of
  Flutter, sqflite, and Firebase imports (enforced in CI).
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.11.0

resolution: workspace

dev_dependencies:
  coverage: ^1.11.0
  lints: ^6.0.0
  test: ^1.25.0

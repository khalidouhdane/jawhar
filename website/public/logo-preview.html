<!DOCTYPE html>
<html>
<head><title>Logo SVG Preview v2</title></head>
<body style="background:#fff; display:flex; gap:40px; align-items:center; justify-content:center; min-height:100vh; flex-wrap:wrap;">

<!-- Large preview -->
<div style="text-align:center; color:#333; font-family:monospace;">
  <svg width="200" height="200" viewBox="0 0 100 100" fill="none" stroke="black" xmlns="http://www.w3.org/2000/svg">
    <!-- Outer hexagon (Diamond base) -->
    <path d="M 50 95 L 12 50 L 25 25 L 50 5 L 75 25 L 88 50 Z" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    
    <!-- Inner Y-shape (Book covers and spine) -->
    <path d="M 25 25 L 50 40 L 75 25" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M 50 40 L 50 95" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Left page block -->
    <path d="M 18 48 L 28 30" stroke-width="2" stroke-linecap="round"/>
    <path d="M 28 30 Q 40 37 50 40" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 18 48 Q 35 65 50 80" stroke-width="2" stroke-linejoin="round"/>

    <!-- Right page block -->
    <path d="M 82 48 L 72 30" stroke-width="2" stroke-linecap="round"/>
    <path d="M 72 30 Q 60 37 50 40" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 82 48 Q 65 65 50 80" stroke-width="2" stroke-linejoin="round"/>

    <!-- Left page lines -->
    <path d="M 21 44 Q 35 57 48 68" stroke-width="1"/>
    <path d="M 23 40 Q 35 50 48 60" stroke-width="1"/>
    <path d="M 25 36 Q 35 44 48 52" stroke-width="1"/>

    <!-- Right page lines -->
    <path d="M 79 44 Q 65 57 52 68" stroke-width="1"/>
    <path d="M 77 40 Q 65 50 52 60" stroke-width="1"/>
    <path d="M 75 36 Q 65 44 52 52" stroke-width="1"/>

  </svg>
  <div>200px</div>
</div>

<!-- Nav size preview (22px) -->
<div style="text-align:center; color:#333; font-family:monospace; background:white; padding:20px; border-radius:8px;">
  <svg width="24" height="24" viewBox="0 0 100 100" fill="none" stroke="black" xmlns="http://www.w3.org/2000/svg">
    <!-- Simplified for small size: thicker lines, fewer details -->
    <!-- Outer hexagon -->
    <path d="M 50 95 L 12 50 L 25 25 L 50 5 L 75 25 L 88 50 Z" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
    
    <!-- Inner Y-shape -->
    <path d="M 25 25 L 50 40 L 75 25" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M 50 40 L 50 95" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Pages (simplified) -->
    <path d="M 18 48 L 28 30 Q 40 37 50 40" stroke-width="3" stroke-linejoin="round"/>
    <path d="M 18 48 Q 35 65 50 80" stroke-width="3" stroke-linejoin="round"/>
    
    <path d="M 82 48 L 72 30 Q 60 37 50 40" stroke-width="3" stroke-linejoin="round"/>
    <path d="M 82 48 Q 65 65 50 80" stroke-width="3" stroke-linejoin="round"/>
  </svg>
  <div>24px nav</div>
</div>

</body>
</html>
